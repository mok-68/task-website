<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 รายการสิ่งที่ต้องทำ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #581c87 50%, #1e293b 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"] {
            width: 100%;
            padding: 12px 16px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        input::placeholder {
            color: #64748b;
        }

        .datetime-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9333ea 0%, #db2777 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(147, 51, 234, 0.4);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(147, 51, 234, 0.6);
        }

        .todo-list {
            margin-top: 24px;
        }

        .todo-item {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: start;
            gap: 16px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            border-color: #a855f7;
        }

        .todo-item.completed {
            background: rgba(51, 65, 85, 0.5);
            border-color: #475569;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #64748b;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .checkbox:hover {
            border-color: #a855f7;
        }

        .checkbox.checked {
            background: #22c55e;
            border-color: #22c55e;
        }

        .todo-content {
            flex: 1;
        }

        .todo-task {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .todo-item.completed .todo-task {
            color: #64748b;
            text-decoration: line-through;
        }

        .todo-datetime {
            color: #94a3b8;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .countdown {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(168, 85, 247, 0.2);
            border-radius: 8px;
            color: #a855f7;
            font-weight: 600;
            font-size: 14px;
        }

        .countdown.warning {
            background: rgba(251, 146, 60, 0.2);
            color: #fb923c;
        }

        .countdown.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #ef4444;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 48px 0;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .empty-state p {
            color: #94a3b8;
            font-size: 18px;
        }

        .empty-state small {
            color: #64748b;
            display: block;
            margin-top: 8px;
        }

        h2 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .alert-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .alert-box {
            background: linear-gradient(135deg, #1e293b 0%, #581c87 100%);
            border: 3px solid #ef4444;
            border-radius: 24px;
            padding: 48px;
            max-width: 500px;
            text-align: center;
            animation: shake 0.5s infinite;
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.6);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            75% { transform: translateX(10px) rotate(2deg); }
        }

        .alert-icon {
            font-size: 6rem;
            margin-bottom: 24px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .alert-title {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .alert-task {
            color: #fbbf24;
            font-size: 1.5rem;
            margin-bottom: 32px;
            font-weight: 600;
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 18px 56px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.5);
            transition: all 0.3s;
        }

        .btn-stop:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.7);
        }

        .btn-stop:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 รายการสิ่งที่ต้องทำ</h1>
            <p class="subtitle">จัดการงานของคุณให้เป็นระเบียบ พร้อมนับเวลาถอยหลัง</p>

            <div class="form-group">
                <label>สิ่งที่ต้องทำ</label>
                <input type="text" id="taskInput" placeholder="พิมพ์งานที่ต้องทำ...">
            </div>

            <div class="datetime-group">
                <div class="form-group">
                    <label>📅 วันที่</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group">
                    <label>🕐 เวลา</label>
                    <input type="time" id="timeInput">
                </div>
            </div>

            <button class="btn-add" onclick="addTodo()">
                <span style="font-size: 20px;">+</span>
                เพิ่มงาน
            </button>
        </div>

        <div class="card">
            <h2 id="todoCount">รายการงาน (0)</h2>
            <div id="todoList" class="todo-list">
                <div class="empty-state">
                    <div class="icon">✨</div>
                    <p>ยังไม่มีรายการงาน</p>
                    <small>เพิ่มงานแรกของคุณเลย!</small>
                </div>
            </div>
        </div>
    </div>

    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box">
            <div class="alert-icon">⏰</div>
            <div class="alert-title">🔔 ถึงเวลาแล้ว! 🔔</div>
            <div class="alert-task" id="alertTask"></div>
            <button class="btn-stop" onclick="stopAlert()">✋ หยุดการแจ้งเตือน</button>
        </div>
    </div>

    <script>
        let todos = [];
        let countdownInterval;
        let alertInterval;
        let currentAlertTodo = null;

        // สร้างเสียงแจ้งเตือนแบบดังและชัดเจน
        function createAlertSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // สร้างเสียงแจ้งเตือนสองโทน
            const oscillator1 = audioContext.createOscillator();
            const oscillator2 = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator1.connect(gainNode);
            oscillator2.connect(gainNode);
            gainNode.connect(audioContext.destination);

            // โทนเสียงสูง-ต่ำสลับกัน
            oscillator1.frequency.value = 880; // A5
            oscillator2.frequency.value = 440; // A4
            oscillator1.type = 'sine';
            oscillator2.type = 'sine';

            // ปรับระดับเสียงให้ดังขึ้น
            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator1.start(audioContext.currentTime);
            oscillator1.stop(audioContext.currentTime + 0.15);
            
            oscillator2.start(audioContext.currentTime + 0.15);
            oscillator2.stop(audioContext.currentTime + 0.3);
        }

        // แสดงการแจ้งเตือน
        function showAlert(todo) {
            currentAlertTodo = todo;
            document.getElementById('alertTask').textContent = todo.task;
            document.getElementById('alertOverlay').classList.add('show');
            
            // เล่นเสียงซ้ำทุก 0.8 วินาที
            alertInterval = setInterval(() => {
                createAlertSound();
            }, 800);
            
            // เล่นเสียงครั้งแรกทันที
            createAlertSound();
        }

        // หยุดการแจ้งเตือน
        function stopAlert() {
            document.getElementById('alertOverlay').classList.remove('show');
            
            if (alertInterval) {
                clearInterval(alertInterval);
                alertInterval = null;
            }
            
            // ทำเครื่องหมายว่าเสร็จแล้ว
            if (currentAlertTodo) {
                toggleComplete(currentAlertTodo.id);
                currentAlertTodo = null;
            }
        }

        // ตรวจสอบเวลาและแจ้งเตือน
        function checkAlerts() {
            const now = new Date();
            
            todos.forEach(todo => {
                if (!todo.completed && !todo.alerted) {
                    const todoDateTime = new Date(todo.date + 'T' + todo.time);
                    
                    if (now >= todoDateTime) {
                        todo.alerted = true;
                        showAlert(todo);
                    }
                }
            });
        }

        // อัพเดทเวลาถอยหลัง
        function updateCountdowns() {
            const now = new Date();
            
            todos.forEach(todo => {
                if (!todo.completed) {
                    const todoDateTime = new Date(todo.date + 'T' + todo.time);
                    const diff = todoDateTime - now;
                    
                    const countdownEl = document.getElementById(`countdown-${todo.id}`);
                    if (countdownEl) {
                        if (diff <= 0) {
                            countdownEl.textContent = '⏰ ถึงเวลาแล้ว!';
                            countdownEl.className = 'countdown danger';
                        } else {
                            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                            
                            let timeText = '';
                            if (days > 0) {
                                timeText = `⏳ อีก ${days} วัน ${hours} ชม. ${minutes} นาที`;
                                countdownEl.className = 'countdown';
                            } else if (hours > 0) {
                                timeText = `⏳ อีก ${hours} ชม. ${minutes} นาที ${seconds} วินาที`;
                                countdownEl.className = 'countdown';
                            } else if (minutes > 5) {
                                timeText = `⏳ อีก ${minutes} นาที ${seconds} วินาที`;
                                countdownEl.className = 'countdown';
                            } else if (minutes > 0) {
                                timeText = `⚠️ อีก ${minutes} นาที ${seconds} วินาที`;
                                countdownEl.className = 'countdown warning';
                            } else {
                                timeText = `🚨 อีก ${seconds} วินาที`;
                                countdownEl.className = 'countdown danger';
                            }
                            
                            countdownEl.textContent = timeText;
                        }
                    }
                }
            });
            
            checkAlerts();
        }

        // ตั้งค่าวันที่และเวลาเริ่มต้น
        function initDateTime() {
            const now = new Date();
            const date = now.toISOString().split('T')[0];
            const time = now.toTimeString().slice(0, 5);
            document.getElementById('dateInput').value = date;
            document.getElementById('timeInput').value = time;
        }

        // เพิ่มงาน
        function addTodo() {
            const taskInput = document.getElementById('taskInput');
            const dateInput = document.getElementById('dateInput');
            const timeInput = document.getElementById('timeInput');

            if (taskInput.value.trim()) {
                const todo = {
                    id: Date.now(),
                    task: taskInput.value,
                    date: dateInput.value,
                    time: timeInput.value,
                    completed: false,
                    alerted: false
                };

                todos.push(todo);
                taskInput.value = '';
                renderTodos();
            }
        }

        // สลับสถานะเสร็จสิ้น
        function toggleComplete(id) {
            todos = todos.map(todo => 
                todo.id === id ? { ...todo, completed: !todo.completed } : todo
            );
            renderTodos();
        }

        // ลบงาน
        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            renderTodos();
        }

        // แปลงวันที่และเวลาเป็นภาษาไทย
        function formatDateTime(date, time) {
            const d = new Date(date + 'T' + time);
            const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 
                                'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            return `${d.getDate()} ${thaiMonths[d.getMonth()]} ${d.getFullYear() + 543} เวลา ${time} น.`;
        }

        // แสดงรายการงาน
        function renderTodos() {
            const todoList = document.getElementById('todoList');
            const todoCount = document.getElementById('todoCount');
            
            todoCount.textContent = `รายการงาน (${todos.length})`;

            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">✨</div>
                        <p>ยังไม่มีรายการงาน</p>
                        <small>เพิ่มงานแรกของคุณเลย!</small>
                    </div>
                `;
                return;
            }

            // เรียงตามวันเวลา
            const sortedTodos = [...todos].sort((a, b) => {
                const dateTimeA = new Date(a.date + 'T' + a.time);
                const dateTimeB = new Date(b.date + 'T' + b.time);
                return dateTimeA - dateTimeB;
            });

            todoList.innerHTML = sortedTodos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleComplete(${todo.id})">
                        ${todo.completed ? '✓' : ''}
                    </div>
                    <div class="todo-content">
                        <div class="todo-task">${todo.task}</div>
                        <div class="todo-datetime">
                            📅 ${formatDateTime(todo.date, todo.time)}
                        </div>
                        ${!todo.completed ? `<div class="countdown" id="countdown-${todo.id}">⏳ กำลังคำนวณ...</div>` : ''}
                    </div>
                    <button class="btn-delete" onclick="deleteTodo(${todo.id})">🗑️</button>
                </div>
            `).join('');
            
            updateCountdowns();
        }

        // กด Enter เพื่อเพิ่มงาน
        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        // เริ่มต้น
        initDateTime();
        
        // อัพเดทเวลาถอยหลังทุกวินาที
        countdownInterval = setInterval(updateCountdowns, 1000);
    </script>
</body>
</html>
