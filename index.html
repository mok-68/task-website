<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 รายการสิ่งที่ต้องทำ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #581c87 50%, #1e293b 100%);
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1 {
            color: white;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="text"],
        input[type="date"],
        input[type="time"],
        select {
            width: 100%;
            padding: 12px 16px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="date"]:focus,
        input[type="time"]:focus,
        select:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        input::placeholder {
            color: #64748b;
        }

        select {
            cursor: pointer;
        }

        select option {
            background: #334155;
            color: white;
        }

        .datetime-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .date-range-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .time-option {
            margin-top: 12px;
        }

        .btn-add {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9333ea 0%, #db2777 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(147, 51, 234, 0.4);
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(147, 51, 234, 0.6);
        }

        .todo-list {
            margin-top: 24px;
        }

        .todo-item {
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            border: 1px solid #475569;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            align-items: start;
            gap: 16px;
            transition: all 0.3s;
        }

        .todo-item:hover {
            border-color: #a855f7;
        }

        .todo-item.completed {
            background: rgba(34, 197, 94, 0.1);
            border-color: #22c55e;
        }

        .todo-item.expired {
            opacity: 0.6;
        }

        .todo-item.multi-day {
            border-left: 4px solid #06b6d4;
        }

        .todo-item.all-day {
            border-left: 4px solid #f59e0b;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #64748b;
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .checkbox:hover {
            border-color: #a855f7;
        }

        .checkbox.checked {
            background: #22c55e;
            border-color: #22c55e;
        }

        .todo-content {
            flex: 1;
        }

        .todo-task {
            color: white;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .todo-item.completed .todo-task {
            color: #22c55e;
            text-decoration: line-through;
        }

        .todo-item.expired .todo-task {
            color: #64748b;
        }

        .todo-datetime {
            color: #94a3b8;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }

        .todo-badge {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
        }

        .todo-badge.all-day {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .countdown {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(168, 85, 247, 0.2);
            border-radius: 8px;
            color: #a855f7;
            font-weight: 600;
            font-size: 14px;
        }

        .countdown.warning {
            background: rgba(251, 146, 60, 0.2);
            color: #fb923c;
        }

        .countdown.danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            animation: pulse 1s infinite;
        }

        .countdown.expired {
            background: rgba(100, 116, 139, 0.2);
            color: #64748b;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #ef4444;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .empty-state {
            text-align: center;
            padding: 48px 0;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .empty-state p {
            color: #94a3b8;
            font-size: 18px;
        }

        .empty-state small {
            color: #64748b;
            display: block;
            margin-top: 8px;
        }

        h2 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 24px;
        }

        .alert-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .alert-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .alert-box {
            background: linear-gradient(135deg, #1e293b 0%, #581c87 100%);
            border: 3px solid #ef4444;
            border-radius: 24px;
            padding: 48px;
            max-width: 500px;
            text-align: center;
            animation: shake 0.5s infinite;
            box-shadow: 0 20px 60px rgba(239, 68, 68, 0.6);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            75% { transform: translateX(10px) rotate(2deg); }
        }

        .alert-icon {
            font-size: 6rem;
            margin-bottom: 24px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .alert-title {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .alert-task {
            color: #fbbf24;
            font-size: 1.5rem;
            margin-bottom: 32px;
            font-weight: 600;
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 18px 56px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.5);
            transition: all 0.3s;
        }

        .btn-stop:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(239, 68, 68, 0.7);
        }

        .btn-stop:active {
            transform: scale(0.95);
        }

        .section-title {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .storage-info {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 16px;
            color: #22c55e;
            font-size: 12px;
            text-align: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📝 รายการสิ่งที่ต้องทำ</h1>
            <p class="subtitle">จัดการงานของคุณให้เป็นระเบียบ พร้อมนับเวลาถอยหลัง</p>
            <div class="storage-info">💾 ข้อมูลบันทึกอัตโนมัติ - ไม่หายแม้ปิดเบราว์เซอร์</div>

            <div class="form-group">
                <label>สิ่งที่ต้องทำ</label>
                <input type="text" id="taskInput" placeholder="พิมพ์งานที่ต้องทำ...">
            </div>

            <div class="form-group">
                <label>ประเภทกิจกรรม</label>
                <select id="taskType" onchange="updateDateTimeFields()">
                    <option value="single">📅 วันเดียว + เวลาที่กำหนด</option>
                    <option value="single-allday">📅 วันเดียว + ทั้งวัน</option>
                    <option value="multi">📆 หลายวัน + เวลาที่กำหนด</option>
                    <option value="multi-allday">📆 หลายวัน + ทั้งวัน</option>
                </select>
            </div>

            <div id="singleDateGroup" class="datetime-group">
                <div class="form-group">
                    <label>📅 วันที่</label>
                    <input type="date" id="dateInput">
                </div>
                <div class="form-group" id="timeGroup">
                    <label>🕐 เวลา</label>
                    <input type="time" id="timeInput">
                </div>
            </div>

            <div id="multiDateGroup" class="hidden">
                <div class="date-range-group">
                    <div class="form-group">
                        <label>📅 วันเริ่มต้น</label>
                        <input type="date" id="startDateInput">
                    </div>
                    <div class="form-group">
                        <label>📅 วันสิ้นสุด</label>
                        <input type="date" id="endDateInput">
                    </div>
                </div>
                <div class="form-group" id="multiTimeGroup">
                    <label>🕐 เวลา</label>
                    <input type="time" id="multiTimeInput">
                </div>
            </div>

            <button class="btn-add" onclick="addTodo()">
                <span style="font-size: 20px;">+</span>
                เพิ่มงาน
            </button>
        </div>

        <div class="card">
            <h2 id="todoCount">รายการงาน (0)</h2>
            <div id="todoList" class="todo-list">
                <div class="empty-state">
                    <div class="icon">✨</div>
                    <p>ยังไม่มีรายการงาน</p>
                    <small>เพิ่มงานแรกของคุณเลย!</small>
                </div>
            </div>
        </div>
    </div>

    <div class="alert-overlay" id="alertOverlay">
        <div class="alert-box">
            <div class="alert-icon">⏰</div>
            <div class="alert-title">🔔 ถึงเวลาแล้ว! 🔔</div>
            <div class="alert-task" id="alertTask"></div>
            <button class="btn-stop" onclick="stopAlert()">✋ รับทราบ</button>
        </div>
    </div>

    <script>
        let todos = [];
        let countdownInterval;
        let alertInterval;
        let currentAlertTodo = null;
        let cleanupInterval;

        function updateDateTimeFields() {
            const taskType = document.getElementById('taskType').value;
            const singleDateGroup = document.getElementById('singleDateGroup');
            const multiDateGroup = document.getElementById('multiDateGroup');
            const timeGroup = document.getElementById('timeGroup');
            const multiTimeGroup = document.getElementById('multiTimeGroup');

            if (taskType === 'single' || taskType === 'single-allday') {
                singleDateGroup.classList.remove('hidden');
                multiDateGroup.classList.add('hidden');
                
                if (taskType === 'single-allday') {
                    timeGroup.classList.add('hidden');
                } else {
                    timeGroup.classList.remove('hidden');
                }
            } else {
                singleDateGroup.classList.add('hidden');
                multiDateGroup.classList.remove('hidden');
                
                if (taskType === 'multi-allday') {
                    multiTimeGroup.classList.add('hidden');
                } else {
                    multiTimeGroup.classList.remove('hidden');
                }
            }
        }

        function loadTodos() {
            try {
                const saved = localStorage.getItem('todoList');
                if (saved) {
                    todos = JSON.parse(saved);
                    console.log('✅ โหลดข้อมูล:', todos.length, 'รายการ');
                } else {
                    todos = [];
                    console.log('ℹ️ เริ่มต้นใหม่');
                }
            } catch (error) {
                console.error('❌ โหลดข้อมูลไม่สำเร็จ:', error);
                todos = [];
            }
            renderTodos();
        }

        function saveTodos() {
            try {
                localStorage.setItem('todoList', JSON.stringify(todos));
                console.log('💾 บันทึก:', todos.length, 'รายการ');
            } catch (error) {
                console.error('❌ บันทึกไม่สำเร็จ:', error);
            }
        }

        function cleanupExpiredTodos() {
            const now = new Date();
            const initialLength = todos.length;
            
            todos = todos.filter(todo => {
                let isExpired = false;
                
                if (todo.isMultiDay) {
                    const endDate = new Date(todo.endDate + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                    isExpired = now > endDate;
                } else {
                    const todoDateTime = new Date(todo.date + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                    isExpired = now > todoDateTime;
                }
                
                return !isExpired || !todo.completed;
            });
            
            if (todos.length !== initialLength) {
                saveTodos();
                console.log(`ลบงานที่เสร็จและหมดเวลา: ${initialLength - todos.length} รายการ`);
                renderTodos();
            }
        }

        function createAlertSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            const oscillator1 = audioContext.createOscillator();
            const oscillator2 = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator1.connect(gainNode);
            oscillator2.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator1.frequency.value = 880;
            oscillator2.frequency.value = 440;
            oscillator1.type = 'sine';
            oscillator2.type = 'sine';

            gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);

            oscillator1.start(audioContext.currentTime);
            oscillator1.stop(audioContext.currentTime + 0.15);
            
            oscillator2.start(audioContext.currentTime + 0.15);
            oscillator2.stop(audioContext.currentTime + 0.3);
        }

        function showAlert(todo) {
            currentAlertTodo = todo;
            document.getElementById('alertTask').textContent = todo.task;
            document.getElementById('alertOverlay').classList.add('show');
            
            alertInterval = setInterval(() => {
                createAlertSound();
            }, 800);
            
            createAlertSound();
        }

        function stopAlert() {
            document.getElementById('alertOverlay').classList.remove('show');
            
            if (alertInterval) {
                clearInterval(alertInterval);
                alertInterval = null;
            }
            
            if (currentAlertTodo) {
                toggleComplete(currentAlertTodo.id);
                currentAlertTodo = null;
            }
        }

        function checkAlerts() {
            const now = new Date();
            
            todos.forEach(todo => {
                if (!todo.completed && !todo.alerted && !todo.isAllDay) {
                    let alertTime;
                    
                    if (todo.isMultiDay) {
                        alertTime = new Date(todo.startDate + 'T' + todo.time);
                    } else {
                        alertTime = new Date(todo.date + 'T' + todo.time);
                    }
                    
                    if (now >= alertTime) {
                        todo.alerted = true;
                        showAlert(todo);
                        saveTodos();
                    }
                }
            });
        }

        function updateCountdowns() {
            const now = new Date();
            
            todos.forEach(todo => {
                if (!todo.completed) {
                    const countdownEl = document.getElementById(`countdown-${todo.id}`);
                    if (countdownEl) {
                        let targetDateTime;
                        
                        if (todo.isMultiDay) {
                            if (todo.time) {
                                targetDateTime = new Date(todo.startDate + 'T' + todo.time);
                            } else {
                                targetDateTime = new Date(todo.startDate + 'T00:00:00');
                            }
                        } else {
                            if (todo.time) {
                                targetDateTime = new Date(todo.date + 'T' + todo.time);
                            } else {
                                targetDateTime = new Date(todo.date + 'T00:00:00');
                            }
                        }
                        
                        const diff = targetDateTime - now;
                        
                        if (diff <= 0) {
                            if (todo.isMultiDay) {
                                const endDateTime = new Date(todo.endDate + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                                if (now <= endDateTime) {
                                    countdownEl.textContent = '▶️ กำลังดำเนินการ';
                                    countdownEl.className = 'countdown';
                                } else {
                                    countdownEl.textContent = '⏰ หมดเวลาแล้ว (รอการยืนยัน)';
                                    countdownEl.className = 'countdown expired';
                                }
                            } else {
                                countdownEl.textContent = '⏰ หมดเวลาแล้ว (รอการยืนยัน)';
                                countdownEl.className = 'countdown expired';
                            }
                        } else {
                            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                            
                            let timeText = '';
                            if (days > 0) {
                                timeText = `⏳ อีก ${days} วัน ${hours} ชม. ${minutes} นาที`;
                                countdownEl.className = 'countdown';
                            } else if (hours > 0) {
                                timeText = `⏳ อีก ${hours} ชม. ${minutes} นาที ${seconds} วินาที`;
                                countdownEl.className = 'countdown';
                            } else if (minutes > 5) {
                                timeText = `⏳ อีก ${minutes} นาที ${seconds} วินาที`;
                                countdownEl.className = 'countdown';
                            } else if (minutes > 0) {
                                timeText = `⚠️ อีก ${minutes} นาที ${seconds} วินาที`;
                                countdownEl.className = 'countdown warning';
                            } else {
                                timeText = `🚨 อีก ${seconds} วินาที`;
                                countdownEl.className = 'countdown danger';
                            }
                            
                            countdownEl.textContent = timeText;
                        }
                    }
                }
            });
            
            checkAlerts();
        }

        function initDateTime() {
            const now = new Date();
            const date = now.toISOString().split('T')[0];
            const time = now.toTimeString().slice(0, 5);
            
            document.getElementById('dateInput').value = date;
            document.getElementById('timeInput').value = time;
            document.getElementById('startDateInput').value = date;
            document.getElementById('endDateInput').value = date;
            document.getElementById('multiTimeInput').value = time;
        }

        function addTodo() {
            const taskInput = document.getElementById('taskInput');
            const taskType = document.getElementById('taskType').value;

            if (!taskInput.value.trim()) {
                return;
            }

            const todo = {
                id: Date.now(),
                task: taskInput.value,
                completed: false,
                alerted: false
            };

            if (taskType === 'single') {
                todo.date = document.getElementById('dateInput').value;
                todo.time = document.getElementById('timeInput').value;
                todo.isMultiDay = false;
                todo.isAllDay = false;
            } else if (taskType === 'single-allday') {
                todo.date = document.getElementById('dateInput').value;
                todo.time = null;
                todo.isMultiDay = false;
                todo.isAllDay = true;
            } else if (taskType === 'multi') {
                todo.startDate = document.getElementById('startDateInput').value;
                todo.endDate = document.getElementById('endDateInput').value;
                todo.time = document.getElementById('multiTimeInput').value;
                todo.isMultiDay = true;
                todo.isAllDay = false;
            } else if (taskType === 'multi-allday') {
                todo.startDate = document.getElementById('startDateInput').value;
                todo.endDate = document.getElementById('endDateInput').value;
                todo.time = null;
                todo.isMultiDay = true;
                todo.isAllDay = true;
            }

            todos.push(todo);
            taskInput.value = '';
            saveTodos();
            renderTodos();
        }

        function toggleComplete(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                
                const now = new Date();
                let isExpired = false;
                
                if (todo.isMultiDay) {
                    const endDateTime = new Date(todo.endDate + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                    isExpired = now > endDateTime;
                } else {
                    const todoDateTime = new Date(todo.date + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                    isExpired = now > todoDateTime;
                }
                
                if (todo.completed && isExpired) {
                    setTimeout(() => {
                        todos = todos.filter(t => t.id !== id);
                        saveTodos();
                        renderTodos();
                    }, 500);
                } else {
                    saveTodos();
                    renderTodos();
                }
            }
        }

        function deleteTodo(id) {
            todos = todos.filter(todo => todo.id !== id);
            saveTodos();
            renderTodos();
        }

        function formatDateTime(todo) {
            const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 
                                'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
            
            if (todo.isMultiDay) {
                const startDate = new Date(todo.startDate);
                const endDate = new Date(todo.endDate);
                const startStr = `${startDate.getDate()} ${thaiMonths[startDate.getMonth()]} ${startDate.getFullYear() + 543}`;
                const endStr = `${endDate.getDate()} ${thaiMonths[endDate.getMonth()]} ${endDate.getFullYear() + 543}`;
                
                if (todo.time) {
                    return `${startStr} - ${endStr} เวลา ${todo.time} น.`;
                } else {
                    return `${startStr} - ${endStr} (ทั้งวัน)`;
                }
            } else {
                const d = new Date(todo.date);
                const dateStr = `${d.getDate()} ${thaiMonths[d.getMonth()]} ${d.getFullYear() + 543}`;
                
                if (todo.time) {
                    return `${dateStr} เวลา ${todo.time} น.`;
                } else {
                    return `${dateStr} (ทั้งวัน)`;
                }
            }
        }

        function renderTodos() {
            const todoList = document.getElementById('todoList');
            const todoCount = document.getElementById('todoCount');
            
            todoCount.textContent = `รายการงาน (${todos.length})`;

            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">✨</div>
                        <p>ยังไม่มีรายการงาน</p>
                        <small>เพิ่มงานแรกของคุณเลย!</small>
                    </div>
                `;
                return;
            }

            const now = new Date();
            
            const activeTodos = [];
            const completedTodos = [];
            const expiredTodos = [];
            
            todos.forEach(todo => {
                let isExpired = false;
                
                if (todo.isMultiDay) {
                    const endDateTime = new Date(todo.endDate + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                    isExpired = now > endDateTime;
                } else {
                    const todoDateTime = new Date(todo.date + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                    isExpired = now > todoDateTime;
                }
                
                if (todo.completed) {
                    completedTodos.push(todo);
                } else if (isExpired) {
                    expiredTodos.push(todo);
                } else {
                    activeTodos.push(todo);
                }
            });

            const sortByDateTime = (a, b) => {
                let dateTimeA, dateTimeB;
                
                if (a.isMultiDay) {
                    dateTimeA = new Date(a.startDate + (a.time ? 'T' + a.time : 'T00:00:00'));
                } else {
                    dateTimeA = new Date(a.date + (a.time ? 'T' + a.time : 'T00:00:00'));
                }
                
                if (b.isMultiDay) {
                    dateTimeB = new Date(b.startDate + (b.time ? 'T' + b.time : 'T00:00:00'));
                } else {
                    dateTimeB = new Date(b.date + (b.time ? 'T' + b.time : 'T00:00:00'));
                }
                
                return dateTimeA - dateTimeB;
            };

            activeTodos.sort(sortByDateTime);
            expiredTodos.sort(sortByDateTime);
            completedTodos.sort(sortByDateTime);

            let html = '';

            if (activeTodos.length > 0) {
                html += '<div class="section-title">⏳ กำลังดำเนินการ</div>';
                html += activeTodos.map(todo => renderTodoItem(todo, false)).join('');
            }

            if (expiredTodos.length > 0) {
                html += '<div class="section-title">⚠️ หมดเวลาแล้ว - รอการยืนยัน</div>';
                html += expiredTodos.map(todo => renderTodoItem(todo, true)).join('');
            }

            if (completedTodos.length > 0) {
                const notExpiredCompleted = completedTodos.filter(todo => {
                    if (todo.isMultiDay) {
                        const endDateTime = new Date(todo.endDate + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                        return now <= endDateTime;
                    } else {
                        const todoDateTime = new Date(todo.date + (todo.time ? 'T' + todo.time : 'T23:59:59'));
                        return now <= todoDateTime;
                    }
                });
                
                if (notExpiredCompleted.length > 0) {
                    html += '<div class="section-title">✅ เสร็จสิ้นแล้ว</div>';
                    html += notExpiredCompleted.map(todo => renderTodoItem(todo, false)).join('');
                }
            }

            todoList.innerHTML = html;
            updateCountdowns();
        }

        function renderTodoItem(todo, isExpired) {
            let badgeHtml = '';
            let itemClass = '';
            
            if (todo.isMultiDay) {
                badgeHtml = '<span class="todo-badge">📆 หลายวัน</span>';
                itemClass = 'multi-day';
            }
            
            if (todo.isAllDay) {
                badgeHtml += '<span class="todo-badge all-day">⏰ ทั้งวัน</span>';
                if (!itemClass) itemClass = 'all-day';
            }
            
            return `
                <div class="todo-item ${todo.completed ? 'completed' : ''} ${isExpired && !todo.completed ? 'expired' : ''} ${itemClass}">
                    <div class="checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleComplete(${todo.id})">
                        ${todo.completed ? '✓' : ''}
                    </div>
                    <div class="todo-content">
                        <div class="todo-task">${todo.task}</div>
                        <div class="todo-datetime">
                            📅 ${formatDateTime(todo)}
                            ${badgeHtml}
                        </div>
                        ${!todo.completed && !todo.isAllDay ? `<div class="countdown" id="countdown-${todo.id}">⏳ กำลังคำนวณ...</div>` : ''}
                        ${!todo.completed && todo.isAllDay ? `<div class="countdown">📅 กิจกรรมทั้งวัน</div>` : ''}
                    </div>
                    <button class="btn-delete" onclick="deleteTodo(${todo.id})">🗑️</button>
                </div>
            `;
        }

        document.getElementById('taskInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTodo();
            }
        });

        function init() {
            console.log('🚀 เริ่มต้นแอปพลิเคชัน');
            
            initDateTime();
            updateDateTimeFields();
            loadTodos();
            
            countdownInterval = setInterval(updateCountdowns, 1000);
            cleanupInterval = setInterval(cleanupExpiredTodos, 30000);
            
            console.log('✅ พร้อมใช้งาน!');
        }

        init();
    </script>
</body>
</html>
